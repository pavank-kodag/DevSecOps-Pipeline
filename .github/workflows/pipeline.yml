name: DevSecOps Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: run Tests
    runs-on: ubuntu-latest
    steps:
      -uses: actions/checkout@v4
      
      -name: Set Up Python
       uses: actions/setup-python@v4
       with:
         python-version: '3.11'

      -name: Install Dependencies
       run: pip install -r app/requirements.txt

      -name: Run Pytest
       run: pytest app/tests/

